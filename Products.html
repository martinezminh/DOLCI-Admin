<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolci Admin — Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fff8f9] text-[#2E1E22]" style="font-family:'DM Sans',sans-serif;">

<!-- ===================== Navbar ===================== -->
<nav class="sticky top-0 z-50 w-full bg-[#fff8f9]/90 backdrop-blur-md border-b border-[#f9c4d4]">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center gap-8">
    <a href="dashboard.html" class="text-2xl font-bold text-[#c95c7a] mr-auto select-none" style="font-family:'Playfair Display',serif;">
      🎀 Dolci <span class="text-xs font-medium text-[#6b4352] align-middle ml-1" style="font-family:'DM Sans',sans-serif;">Admin</span>
    </a>
    <ul class="hidden md:flex items-center gap-8">
      <li><a href="Dashboard.html" class="text-sm font-medium text-[#6b4352] hover:text-[#c95c7a]">Dashboard</a></li>
      <li><a href="Orders.html" class="text-sm font-medium text-[#6b4352] hover:text-[#c95c7a]">Orders</a></li>
      <li><a href="Products.html" class="text-sm font-semibold text-[#c95c7a]">Products</a></li>
      <li><a href="Payments.html" class="text-sm font-medium text-[#6b4352] hover:text-[#c95c7a]">Payments &amp; Customers</a></li>
    </ul>
    <a href="index.html" class="px-5 py-2 bg-[#c95c7a] text-white rounded-full text-sm font-semibold hover:bg-[#b54d6a] transition-all">Sign Out</a>
  </div>
</nav>
<!-- ======================== /Navbar ======================== -->

<main class="max-w-7xl mx-auto px-6 py-10">

  <div class="flex flex-wrap justify-between items-end gap-4 mb-6">
    <div>
      <h1 class="text-3xl font-bold text-[#9c2963]" style="font-family:'Playfair Display',serif;">Products</h1>
      <p class="text-sm text-[#6b4352] mt-1">Manage the cake menu customers see on the site.</p>
    </div>
    <a href="products.html" class="px-5 py-2 rounded-full bg-[#c95c7a] text-white text-sm font-semibold hover:bg-[#b54d6a]">+ Add New Cake</a>
  </div>

  <div class="grid lg:grid-cols-3 gap-6">

    <!-- Product table -->
    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-[#f9c4d4] overflow-x-auto">
      <table class="w-full text-sm min-w-[600px]">
        <thead>
          <tr class="text-left text-xs uppercase text-[#b07a8e] border-b border-[#f9c4d4] bg-[#fde8ef]/50">
            <th class="py-3 px-4">Cake</th>
            <th class="py-3 px-4">Size</th>
            <th class="py-3 px-4">Price</th>
            <th class="py-3 px-4">Available</th>
            <th class="py-3 px-4"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#fde8ef]">
          <tr>
            <td class="py-3 px-4"><input type="text" value="Bento Cake" class="w-full px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="Regular" class="w-24 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="₱270" class="w-20 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="checkbox" checked class="w-4 h-4 accent-[#c95c7a]" /></td>
            <td class="py-3 px-4 text-right"><a href="products.html" class="text-xs text-[#c95c7a] font-semibold hover:underline">Delete</a></td>
          </tr>
          <tr>
            <td class="py-3 px-4"><input type="text" value="Cheesecake" class="w-full px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="Standard" class="w-24 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="₱475" class="w-20 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="checkbox" checked class="w-4 h-4 accent-[#c95c7a]" /></td>
            <td class="py-3 px-4 text-right"><a href="products.html" class="text-xs text-[#c95c7a] font-semibold hover:underline">Delete</a></td>
          </tr>
          <tr>
            <td class="py-3 px-4"><input type="text" value="Crinkles" class="w-full px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="Box of 12" class="w-24 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="text" value="₱150" class="w-20 px-2 py-1 rounded-lg border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" /></td>
            <td class="py-3 px-4"><input type="checkbox" class="w-4 h-4 accent-[#c95c7a]" /></td>
            <td class="py-3 px-4 text-right"><a href="products.html" class="text-xs text-[#c95c7a] font-semibold hover:underline">Delete</a></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Add/edit cake form -->
    <div class="bg-white rounded-2xl shadow-sm border border-[#f9c4d4] p-6 h-fit">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-[#6b4352] mb-4">Add / Edit Cake</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-[#6b4352] mb-1">Cake Name</label>
          <input type="text" placeholder="e.g. Red Velvet Cake" class="w-full px-3 py-2 rounded-xl border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-[#6b4352] mb-1">Flavor</label>
            <input type="text" placeholder="Chocolate" class="w-full px-3 py-2 rounded-xl border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#6b4352] mb-1">Filling</label>
            <input type="text" placeholder="Custard" class="w-full px-3 py-2 rounded-xl border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-[#6b4352] mb-1">Size</label>
            <input type="text" placeholder="8 inch" class="w-full px-3 py-2 rounded-xl border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#6b4352] mb-1">Price</label>
            <input type="text" placeholder="₱750" class="w-full px-3 py-2 rounded-xl border border-[#f9c4d4] text-sm outline-none focus:border-[#c95c7a]" />
          </div>
        </div>
        <label class="flex items-center gap-2 text-xs font-semibold text-[#6b4352]">
          <input type="checkbox" checked class="w-4 h-4 accent-[#c95c7a]" /> Available for ordering
        </label>
      </div>
      <div class="flex justify-end gap-3 mt-5">
        <a href="Products.html" class="px-4 py-2 rounded-full border border-[#f9c4d4] text-[#6b4352] text-sm font-medium hover:bg-[#fde8ef]">Cancel</a>
        <a href="Products.html" class="px-4 py-2 rounded-full bg-[#c95c7a] text-white text-sm font-semibold hover:bg-[#b54d6a]">Save Cake</a>
      </div>
    </div>
  </div>

</main>

<!-- ===================== Footer ===================== -->
<footer class="bg-[#2b171d] text-white/70 py-6 mt-10">
  <div class="max-w-7xl mx-auto px-6 text-center text-xs opacity-50">
    © 2026 Dolci Admin. Internal use only.
  </div>
</footer>
<!-- ===================== /Footer ===================== -->

</body>
</html>
