<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolci Admin — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-[#2E1E22]" style="font-family:'DM Sans',sans-serif;">

<!-- ===================== Navbar ===================== -->
<nav class="sticky top-0 z-50 w-full bg-[#fff8f9]/90 backdrop-blur-md border-b border-[#f9c4d4]">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center gap-8">
    <a href="index.html" class="text-2xl font-bold text-[#c95c7a] mr-auto select-none" style="font-family:'Playfair Display',serif;">
      🎀 Dolci <span class="text-xs font-medium text-[#6b4352] align-middle ml-1" style="font-family:'DM Sans',sans-serif;">Admin</span>
    </a>
  </div>
</nav>
<!-- ===================== /Navbar ===================== -->

<main>
  <section class="bg-gradient-to-br from-[#fde8ef] via-[#fef0f4] to-[#fff8f9] min-h-[80vh] flex items-center">
    <div class="max-w-6xl mx-auto px-6 py-16 w-full flex justify-center">
      <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-[#f9c4d4]/40 p-8">

        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-[#9c2963] mb-1" style="font-family:'Playfair Display',serif;">DOLCI</h1>
          <p class="text-xs uppercase tracking-[3px] text-[#b07a8e]">Admin &amp; Staff Portal</p>
        </div>

        <!-- Role selector (visual only) -->
        <div class="flex bg-[#fde8ef] rounded-full p-1 mb-6 text-sm font-medium">
          <span class="flex-1 text-center py-2 rounded-full bg-[#c95c7a] text-white">Admin</span>
          <span class="flex-1 text-center py-2 rounded-full text-[#6b4352]">Staff</span>
        </div>

        <form class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wide text-[#6b4352] mb-1">Email Address</label>
            <input type="email" placeholder="admin@dolci.com" class="w-full px-4 py-3 rounded-xl border border-[#f9c4d4] outline-none text-sm focus:border-[#c95c7a]" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wide text-[#6b4352] mb-1">Password</label>
            <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-[#f9c4d4] outline-none text-sm focus:border-[#c95c7a]" />
          </div>

          <div class="text-right">
            <a href="#" class="text-xs text-[#c95c7a] hover:underline">Forgot password?</a>
          </div>

          <a href="dashboard.html" class="block text-center w-full py-3 rounded-full bg-[#c95c7a] text-white text-sm font-semibold hover:bg-[#b54d6a] hover:-translate-y-0.5 transition-all shadow-lg shadow-[#c95c7a]/20">
            Sign In
          </a>
        </form>

        <p class="text-center text-[10px] text-[#b07a8e] mt-6">This is a UI prototype. Fields are for display only and are not connected to a live system.</p>
      </div>
    </div>
  </section>
</main>

<!-- ===================== Footer ===================== -->
<footer class="bg-[#2b171d] text-white/70 py-6">
  <div class="max-w-7xl mx-auto px-6 text-center text-xs opacity-50">
    © 2026 Dolci Admin. Internal use only.
  </div>
</footer>
<!-- ===================== /Footer ===================== -->

</body>
</html>
